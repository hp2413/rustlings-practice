# QUIZ 5 (medium)

[[exercises]]
name = "quiz5"
dir = "quizzes"
hint = """
Medium difficulty — Smart pointers (Arc) + Threads (mpsc) + Conversions (parse).

Wrap the input first: `let numbers = Arc::new(numbers);`. Make the channel with
`let (tx, rx) = mpsc::channel();`. Then, for each index, clone BOTH the `Arc`
(`Arc::clone(&numbers)`) and the sender (`tx.clone()`) and `move` them into a
`thread::spawn` closure that does `numbers[i].trim().parse::<i64>().unwrap()`
and `tx.send(...)`.

`parse` is the `FromStr` trait in disguise — the `::<i64>` (or a `let x: i64`)
tells it the target type.

Finally `drop(tx);` the ORIGINAL sender so the channel closes once the worker
clones finish, then `rx.iter().sum()` collects the total.
https://doc.rust-lang.org/book/ch16-02-message-passing.html"""

