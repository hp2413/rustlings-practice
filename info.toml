A closure is written `|parameters| body`, for example `|a, b| a + b`. You
usually don't need to annotate the parameter or return types — the compiler
infers them from how you call the closure. Store it in a `let` binding and call
it like a function: `add(2, 3)`."""

[[exercises]]
name = "closures2"
dir = "24_closures"
hint = """
A closure borrows the variables it uses by default, so the original value stays
usable afterwards. Here you want exactly that: write `|| numbers.iter().sum()`
(no `move`). Adding `move` would take ownership of `numbers`, and then the
`numbers.len()` line below would no longer compile. (NOTES "move closures".)"""

[[exercises]]
name = "closures3"
dir = "24_closures"
hint = """
To change a captured variable, the closure needs mutable access to it, which
makes it an `FnMut` closure. The body is `|| count += 1`. Because calling the
closure mutates state, the closure binding itself must be declared `mut`:
`let mut increment = || count += 1;`."""

[[exercises]]
name = "closures4"
dir = "24_closures"
hint = """
Accept the closure with a generic type parameter bound by a closure trait. A
closure that takes an `i32` and returns an `i32` implements `Fn(i32) -> i32`,
so the bound is `F: Fn(i32) -> i32`. See TRPL ch13.1."""

[[exercises]]
name = "closures5"
