original sending end.

Related section in The Book:
https://doc.rust-lang.org/book/ch16-02-message-passing.html"""

[[exercises]]
name = "move_threads1"
dir = "20_threads"
hint = """
A spawned thread can outlive the function that started it, so its closure isn't
allowed to *borrow* local variables — they might be gone by the time the thread
runs. Take ownership instead by adding the `move` keyword:

```
let handle = thread::spawn(move || numbers.iter().sum::<i32>());
```

After moving `numbers` into the thread you can no longer use it in the parent —
ownership has been transferred. `handle.join().unwrap()` waits for the thread
and hands you back whatever the closure returned.

https://doc.rust-lang.org/book/ch16-01-threads.html#using-move-closures-with-threads"""

[[exercises]]
name = "channels1"
dir = "20_threads"
hint = """
`mpsc` = multiple producer, single consumer. `mpsc::channel()` returns a
`(Sender, Receiver)` tuple:

```
let (tx, rx) = mpsc::channel();
```

Move `tx` into the producer thread and send with `tx.send(message).unwrap()`
(`send` returns a `Result` because it fails if the receiver is gone). On the
main thread, `rx.recv().unwrap()` blocks until a value arrives.

https://doc.rust-lang.org/book/ch16-02-message-passing.html"""

[[exercises]]
name = "channels2"
dir = "20_threads"
hint = """
To have multiple producers, `clone` the sender so each thread gets its own copy:

```
let tx_n = tx.clone();
```

The catch: the *original* `tx` is still alive in the parent scope. The
`for partial in rx` loop only ends once EVERY sender has been dropped, so as long
as that original `tx` lingers the loop blocks forever. Drop it explicitly after
the cloning loop:

```
drop(tx);
```

Each cloned sender is dropped automatically when its thread finishes; dropping
the original lets the receiving loop complete.

https://doc.rust-lang.org/book/ch16-02-message-passing.html"""

