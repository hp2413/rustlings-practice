acc * x)`; the empty range when `n == 0` returns the initial `1`.

`product()` is just a ready-made multiplying fold: `(1..=n).product()`.

`scan(init, |state, &x| { *state += x; Some(*state) })` is like `fold` but YIELDS
each intermediate value, so collecting it gives you the running totals. Don't
