# CAPSTONE

[[exercises]]
name = "word_count1"
dir = "26_capstone"
hint = """
This is `minigrep`'s search core (TRPL ch12.3–12.4). Both functions follow the
same shape: walk the lines and keep the matching ones.

```
for line in contents.lines() {
    if line.contains(query) {
        results.push(line);
    }
}
```

For the case-insensitive version, lowercase BOTH sides before comparing:
`line.to_lowercase().contains(&query)` (note the `&` — `query` is now a
`String`). Push the original `line`, not its lowercased copy, so the returned
slices keep borrowing from `contents` (that's what the `'a` lifetime is for).
https://doc.rust-lang.org/book/ch12-03-improving-error-handling-and-modularity.html"""

[[exercises]]
name = "parallel_sum1"
dir = "26_capstone"
hint = """
Each loop iteration owns its own `start`/`end`, so move them into a thread and
return the chunk's sum:

```
let handle = thread::spawn(move || (start..=end).sum::<u64>());
handles.push(handle);
```

`thread::spawn` returns a `JoinHandle<u64>`. After the spawning loop, collect the
partial sums by joining every handle:

```
for handle in handles {
    total += handle.join().unwrap();
}
```

`.join()` blocks until that thread finishes and gives back whatever its closure
returned. (NOTES "sum 1 - 10^8 using all cores".)
https://doc.rust-lang.org/book/ch16-01-threads.html#using-move-closures-with-threads"""

# DERIVABLE TRAITS

[[exercises]]
name = "derive1"
dir = "31_derive"
hint = """
The tests tell you exactly which traits to derive:

- printed with `{:?}`            -> `Debug`
- used after `let b = a;`        -> `Copy` (copy instead of move; needs `Clone`)
- duplicated with `.clone()`     -> `Clone`
- compared with `==` / `assert_eq!` -> `PartialEq`

Put them all on one line above the struct:
`#[derive(Debug, Clone, Copy, PartialEq)]`.
https://doc.rust-lang.org/book/appendix-03-derivable-traits.html"""

[[exercises]]
name = "derive2"
dir = "31_derive"
hint = """
Work out the traits from the tests:

- `Default::default()`            -> `Default`
- `.sort()` / ordered comparison  -> `PartialOrd` + `Ord` (and `Ord` needs `Eq`)
- used as a `HashMap` key         -> `Eq` + `Hash`
- `assert_eq!` printing & compare -> `Debug` + `PartialEq`

One line covers it all:
`#[derive(Debug, Default, PartialEq, Eq, PartialOrd, Ord, Hash)]`.
Fields are compared in declaration order, so `major` outranks `minor`.
https://doc.rust-lang.org/rust-by-example/trait/derive.html"""

# QUIZ 6 (hard)

[[exercises]]
name = "quiz6"
dir = "quizzes"
hint = """
Hard difficulty — Implementing Iterator + Closures + Patterns + Derive. It pulls
the whole back half of the course together, so tackle it one piece at a time.

1. `Stepper`: put `#[derive(Debug, Clone, PartialEq)]` above it. Then
   `impl Iterator for Stepper { type Item = i64; fn next(&mut self) -> ... }`.
   In `next`, return `None` when `remaining == 0`; otherwise save `current`,
   do `self.current += self.step;`, `self.remaining -= 1;`, and `Some(saved)`.

2. `Size`: `#[derive(Debug, PartialEq)]`. `classify` is a `match n { 0..=9 =>
   Size::Small, 10..=99 => Size::Medium, _ => Size::Large }` (range patterns).

3. `collect_sizes` is generic over the iterator and the closure:
   `fn collect_sizes<I, F>(iter: I, keep: F) -> Vec<Size>
        where I: Iterator<Item = i64>, F: Fn(i64) -> bool`
   Body: `iter.filter(|&n| keep(n)).map(classify).collect()`.
https://doc.rust-lang.org/book/ch13-02-iterators.html#creating-our-own-iterators-with-the-iterator-trait"""
