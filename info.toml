[[exercises]]
name = "drop1"
dir = "19_smart_pointers"
hint = """
Two facts decide the order:
- At the end of a scope, values drop in REVERSE declaration order. Here that
  means `_c`, then `_b`, then `a` — i.e. ["c", "b", "a"].
- `std::mem::drop(value)` drops a value *immediately*, before the scope ends.

You want ["a", "c", "b"]: `a` has to come first, so drop it early. The remaining
`_c` and `_b` then drop in reverse order at the end of the block. Add exactly
`std::mem::drop(a);` at the marked spot.
https://doc.rust-lang.org/book/ch15-03-drop.html"""

[[exercises]]
name = "refcell1"
dir = "19_smart_pointers"
hint = """
`RefCell` lets you mutate through a shared reference by checking the borrow
rules at runtime.

- In `add_one`, take a mutable borrow and add through it:
  `*cell.borrow_mut() += 1;`.
- Make `another_owner` a second handle to the SAME cell by cloning the `Rc`
  (not the inner value): `let another_owner = Rc::clone(&counter);`. That is why
  `Rc::strong_count` becomes 2 and both handles observe every increment.
https://doc.rust-lang.org/book/ch15-05-interior-mutability.html"""

[[exercises]]
name = "weak1"
dir = "19_smart_pointers"
hint = """
`Rc` is a STRONG reference that keeps data alive; `Weak` is a non-owning
reference that does not. Use `Weak` for the child -> parent back-edge so parent
and child don't keep each other alive forever (a reference cycle / leak).

- In `link`, set the back-edge with `Rc::downgrade`:
  `*child.parent.borrow_mut() = Rc::downgrade(parent);`
- In `parent_value`, a `Weak` can't be dereferenced directly — call `.upgrade()`
  to turn it into an `Option<Rc<Node>>`, then read the value:
  `child.parent.borrow().upgrade().map(|parent| parent.value)`.

`.upgrade()` returns `None` once the parent has been dropped, which is exactly
how the leak is avoided.
https://doc.rust-lang.org/book/ch15-06-reference-cycles.html"""

